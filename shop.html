<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shop All — Second Skin</title>
  <meta name="description" content="Shop ready-to-wear leather jackets for men and women — biker, moto, café racer, classic, shearling, suede and western. Handcrafted, genuine leather.">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' fill='%230A0A0A'/%3E%3Ctext x='16' y='22' font-family='Georgia,serif' font-size='16' fill='%23C9B79C' text-anchor='middle'%3ESS%3C/text%3E%3C/svg%3E">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div id="site-header"></div>

  <section class="page-hero">
    <div class="breadcrumb"><a href="index.html">Home</a> / <span id="crumb">Shop All</span></div>
    <span class="eyebrow">Ready-To-Wear</span>
    <h1 class="h2" id="shop-title" style="margin-top:14px;">The Collection</h1>
    <p id="shop-sub">Twenty designs for men and women, every one cut from genuine leather and built to last decades. Free worldwide shipping — or <a href="custom.html" class="link-underline">have one made to your measurements</a>.</p>
  </section>

  <div class="filterbar" id="filterbar"></div>

  <section class="section" style="padding-top:50px;">
    <div class="grid" id="product-grid"></div>
    <p id="empty-state" style="display:none; text-align:center; color:var(--stone); padding:40px;">No jackets match this filter. <a href="shop.html" class="link-underline">View all →</a></p>
  </section>

  <div id="site-footer"></div>

  <script src="js/products.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/main.js"></script>
  <script>
    const params = new URLSearchParams(location.search);
    let activeCat = params.get("cat") || "All";     // style category
    let activeGender = params.get("g") || "All";    // All | Men | Women
    const genders = ["All", "Men", "Women"];

    function visibleCategories() {
      const pool = activeGender === "All" ? PRODUCTS : PRODUCTS.filter(p => p.gender === activeGender);
      return ["All", ...new Set(pool.map(p => p.category))];
    }

    function applyFilter() {
      let list = PRODUCTS.slice();
      if (activeGender !== "All") list = list.filter(p => p.gender === activeGender);
      if (activeCat !== "All") list = list.filter(p => p.category === activeCat);

      const grid = document.getElementById("product-grid");
      const empty = document.getElementById("empty-state");
      grid.innerHTML = list.map(productCardHTML).join("");
      empty.style.display = list.length ? "none" : "block";

      const title = (activeGender !== "All" ? activeGender + " — " : "") +
                    (activeCat !== "All" ? activeCat : "The Collection");
      document.getElementById("shop-title").textContent = title;
      document.getElementById("crumb").textContent = title;
      renderFilters();
      initReveal();
    }

    function renderFilters() {
      const bar = document.getElementById("filterbar");
      bar.innerHTML =
        genders.map(g => `<button data-g="${g}" class="${g === activeGender ? "active" : ""}">${g === "All" ? "Everyone" : g}</button>`).join("") +
        `<span style="width:1px;background:var(--line);margin:0 8px;"></span>` +
        visibleCategories().map(c => `<button data-cat="${c}" class="${c === activeCat ? "active" : ""}">${c === "All" ? "All Styles" : c}</button>`).join("");
      bar.querySelectorAll("button[data-g]").forEach(b =>
        b.addEventListener("click", () => {
          activeGender = b.dataset.g;
          if (!visibleCategories().includes(activeCat)) activeCat = "All";
          applyFilter();
        }));
      bar.querySelectorAll("button[data-cat]").forEach(b =>
        b.addEventListener("click", () => { activeCat = b.dataset.cat; applyFilter(); }));
    }

    document.addEventListener("DOMContentLoaded", applyFilter);
  </script>
</body>
</html>
